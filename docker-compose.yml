# Vidya local development stack (Constitution: web + worker + Postgres +
# Redis + MinIO). All credentials below are LOCAL-DEV-ONLY defaults,
# overridable via a .env file; production injects real secrets at runtime
# (docs/security-review.md#secrets).

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: vidya
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-dev-only-pg}
      POSTGRES_DB: vidya
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vidya -d vidya"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-local-dev-only-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-local-dev-only-minio-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  migrate:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    working_dir: /repo
    command: ["apps/worker/node_modules/.bin/tsx", "scripts/migrate.ts", "up"]
    environment:
      DATABASE_URL: postgres://vidya:${POSTGRES_PASSWORD:-local-dev-only-pg}@postgres:5432/vidya
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment: &app-env
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://vidya:${POSTGRES_PASSWORD:-local-dev-only-pg}@postgres:5432/vidya
      DATABASE_POOL_MAX: "10"
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-local-dev-only-minio}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-local-dev-only-minio-secret}
      S3_BUCKET: vidya
      S3_FORCE_PATH_STYLE: "true"
      WORKER_METRICS_PORT: "9464"
      SYSTEM_HEARTBEAT_INTERVAL_MS: "300000"
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-}
      # The compose stack serves plain http on localhost; production MUST
      # run behind TLS with this set to "true".
      SESSION_COOKIE_SECURE: "false"
      SESSION_TTL_HOURS: "12"
      SESSION_IDLE_MINUTES: "30"
      RESET_TOKEN_TTL_MINUTES: "30"
      LOGIN_MAX_ATTEMPTS: "5"
      LOGIN_WINDOW_MINUTES: "15"
      ANALYTICS_MIN_COHORT: "5"
      ANALYTICS_ATTENDANCE_THRESHOLD: "75"
      ANALYTICS_MARKS_THRESHOLD: "40"
      SHUTDOWN_DRAIN_MS: "5000"
      SHUTDOWN_TIMEOUT_MS: "15000"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment: *app-env
    ports:
      - "9464:9464"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pg-data:
  minio-data:
